name: Bug report
description: Something is incorrect or broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact commands, inputs, or data that trigger the bug.
      placeholder: |
        1. Run `rustcash ...`
        2. With this input: ...
        3. See error: ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: RustCash version / commit
      placeholder: "git rev-parse --short HEAD"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and Rust version
      placeholder: "macOS 15.1, rustc 1.85.0"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, data file snippets, screenshots, anything else relevant.
