name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature requests grounded in real use cases are most useful.
        Describe the workflow you're trying to accomplish, not just the feature you want.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: |
        Describe the real-world accounting or workflow scenario this addresses.
        "I want X" is less useful than "When I'm doing Y, I can't Z because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to happen? How would this work from the user's perspective?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you prefer the proposed solution.

  - type: dropdown
    id: interface
    attributes:
      label: Which interface(s) does this affect?
      multiple: true
      options:
        - CLI
        - TUI
        - GUI
        - API
        - Core accounting engine
        - Reports / plugins
        - Import / export
        - Business features
        - Sync
